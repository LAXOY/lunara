<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cycle Bloom</title>
  <meta name="theme-color" content="#0b0c14" />
  <style>
    :root{
      --bg1:#070810;
      --bg2:#0c1020;
      --card:rgba(19,22,38,.72);
      --card2:rgba(25,30,49,.9);
      --stroke:rgba(255,255,255,.08);
      --text:#f7f4fb;
      --muted:rgba(247,244,251,.66);
      --muted2:rgba(247,244,251,.46);
      --pink:#ff7db3;
      --pink2:#ffd0e2;
      --lav:#b89cff;
      --mint:#7de7c6;
      --gold:#ffd786;
      --shadow:0 24px 80px rgba(0,0,0,.45);
      --r:28px;
      --r2:18px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      color:var(--text);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 12% 10%, rgba(255,125,179,.18), transparent 24%),
        radial-gradient(circle at 86% 14%, rgba(184,156,255,.20), transparent 22%),
        radial-gradient(circle at 55% 115%, rgba(125,231,198,.14), transparent 30%),
        linear-gradient(180deg, #05060b 0%, #090c16 100%);
      overflow-x:hidden;
    }
  </style>
</head>
<body>
  <div class="bgfx"></div>
</body>
</html>
